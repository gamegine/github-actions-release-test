name: release pull request

on:
  pull_request:
    types:
      - opened
      - reopened
    branches:
      - main
      - master

jobs:
  create-rc-branch:
    runs-on: ubuntu-slim
    permissions:
      contents: write
    steps:
      - name: Checkout default branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
      - name: Check branch
        id: branch_check
        run: |
          if git ls-remote --exit-code --heads origin rc > /dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Create and push branch
        if: steps.branch_check.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git checkout -b rc
          git push origin rc
  change-pr-target:
    # Target (base) Source (head)
    if: |
      github.event.pull_request.base.ref == github.event.repository.default_branch &&
      github.event.pull_request.head.ref != 'rc'
    needs: create-rc-branch
    runs-on: ubuntu-slim
    permissions:
      pull-requests: write
    steps:
      - uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              base: 'rc' // new target branch
            });
